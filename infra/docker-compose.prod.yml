services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  core-api:
    build:
      context: ../apps/core-api
      dockerfile: Dockerfile
    container_name: taskflow-core-api
    restart: unless-stopped
    environment:
      # Admin URL — used by prisma migrate deploy inside the container and by
      # any withAdminTx path at runtime.
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      # App URL — restricted taskflow_app role, subject to RLS policies.
      # The role and its password are created by the enable_rls migration.
      DATABASE_URL_APP: "postgresql://taskflow_app:taskflow_app_pw@postgres:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      CORS_ORIGIN: "https://${DOMAIN}"
      NODE_ENV: production
      PORT: 3001
      ANALYTICS_URL: "http://analytics:3002"
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  analytics:
    build:
      context: ../apps/analytics-service
      dockerfile: Dockerfile
    container_name: taskflow-analytics
    restart: unless-stopped
    environment:
      DATABASE_URL_APP: "postgresql://taskflow_app:taskflow_app_pw@postgres:5432/${POSTGRES_DB}"
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ""
    container_name: taskflow-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - core-api
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: taskflow-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - core-api
    networks:
      - internal

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
