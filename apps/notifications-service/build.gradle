plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.1'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.taskflow'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot essentials — web for the health endpoint, jdbc for the LISTEN loop.
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'

    // Postgres JDBC driver — `implementation` (not runtimeOnly) because we import
    // vendor-specific classes PGConnection/PGNotification at compile time for the
    // LISTEN loop.
    implementation 'org.postgresql:postgresql:42.7.4'

    // JSON parsing for the NOTIFY payload. Spring Boot brings Jackson via starter-web,
    // but we call ObjectMapper directly so declare it explicitly for clarity.
    implementation 'com.fasterxml.jackson.core:jackson-databind'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}
